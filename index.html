<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ColorNome — Identificador de Cores</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #f0f0f0;
    --text2: rgba(255,255,255,0.55);
    --text3: rgba(255,255,255,0.3);
    --accent: #e8b45a;
    --accent-dim: rgba(232,180,90,0.15);
    --green: #5ec396;
    --green-dim: rgba(94,195,150,0.15);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; overflow-x: hidden; }
  #app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 14px 18px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); background: var(--bg); }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .palette-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); }

  /* Tabs */
  .tabs { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  /* Capture */
  .capture-area { position: relative; background: #000; overflow: hidden; flex-shrink: 0; }
  #preview-canvas { width: 100%; height: 270px; display: none; cursor: crosshair; object-fit: cover; }
  #camera-video { width: 100%; height: 270px; display: none; object-fit: cover; }
  .placeholder { width: 100%; height: 270px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: var(--surface); cursor: pointer; border-bottom: 0.5px solid var(--border); }
  .ph-icon { font-size: 36px; opacity: .2; }
  .ph-text { font-size: 14px; color: var(--text3); }
  .ph-hint { font-size: 11px; color: var(--text3); opacity: .5; }

  /* Crosshair */
  #crosshair-overlay { position: absolute; inset: 0; pointer-events: none; display: none; }
  #crosshair-ring { position: absolute; width: 60px; height: 60px; border: 2.5px solid #fff; border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 0 1.5px rgba(0,0,0,0.5); transition: left .08s, top .08s; }
  #crosshair-ring::before { content:''; position:absolute; width:1px; height:90px; left:50%; top:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.7); }
  #crosshair-ring::after { content:''; position:absolute; height:1px; width:90px; left:50%; top:50%; transform:translate(-50%,-50%); background:rgba(255,255,255,0.7); }

  /* Controls */
  .controls { display:flex; gap:7px; padding:9px 14px; background:var(--surface); border-bottom:0.5px solid var(--border); }
  .ctrl-btn { flex:1; padding:8px 6px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--surface2); color:var(--text2); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:background .15s; white-space:nowrap; }
  .ctrl-btn.active { border-color:var(--accent); color:var(--accent); }
  .save-btn { background:var(--accent); color:#1a0f00; border:none; border-radius:var(--radius-sm); padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer; display:none; align-items:center; gap:5px; white-space:nowrap; flex-shrink:0; }

  /* Color strip */
  .color-strip { padding:11px 14px; display:flex; align-items:center; gap:11px; background:var(--surface); border-bottom:0.5px solid var(--border); min-height:66px; }
  .swatch-box { width:44px; height:44px; border-radius:10px; flex-shrink:0; border:1px solid rgba(255,255,255,0.1); }
  .swatch-hex { font-size:15px; font-weight:600; letter-spacing:.4px; }
  .swatch-rgb { font-size:11px; color:var(--text3); margin-top:2px; }
  .swatch-empty { font-size:12px; color:var(--text3); line-height:1.5; }
  .tap-badge { font-size:11px; color:var(--text3); background:var(--surface2); padding:3px 9px; border-radius:20px; margin-left:auto; }

  /* Filter chips */
  .filter-row { padding:10px 14px 8px; display:flex; gap:6px; overflow-x:auto; flex-shrink:0; background:var(--bg); border-bottom:0.5px solid var(--border); scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .chip { padding:5px 11px; border-radius:20px; border:0.5px solid var(--border2); font-size:11.5px; color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .18s; flex-shrink:0; display:flex; align-items:center; gap:5px; }
  .chip.on { border-color:transparent; color:#111; font-weight:500; }
  .chip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Results */
  .results { flex:1; overflow-y:auto; padding:10px 14px 28px; }
  .results-label { font-size:11px; color:var(--text3); letter-spacing:.06em; text-transform:uppercase; margin-bottom:9px; }
  .no-filter { padding:30px 20px; text-align:center; color:var(--text3); font-size:13px; line-height:1.7; }
  .pantone-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:11px 13px; display:flex; align-items:center; gap:11px; margin-bottom:7px; cursor:default; }
  .pantone-card.best { border-color:rgba(232,180,90,0.4); background:rgba(232,180,90,0.04); }
  .p-swatch { width:40px; height:40px; border-radius:9px; flex-shrink:0; border:1px solid rgba(255,255,255,0.07); }
  .p-details { flex:1; min-width:0; }
  .p-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .p-meta { font-size:11px; color:var(--text3); margin-top:2px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .cat-badge { font-size:10px; padding:1px 6px; border-radius:10px; font-weight:500; }
  .p-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .match-badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; }
  .match-hi { background:var(--green-dim); color:var(--green); }
  .match-md { background:rgba(232,180,90,0.15); color:var(--accent); }
  .match-lo { background:rgba(255,255,255,0.06); color:var(--text3); }
  .best-tag { font-size:10px; color:var(--accent); }

  /* Palette tab */
  #view-saved { display:none; flex:1; overflow-y:auto; padding:14px; }
  .palette-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .pal-card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .pal-swatch { height:72px; }
  .pal-info { padding:9px 11px; }
  .pal-name { font-size:12px; font-weight:500; }
  .pal-code { font-size:10.5px; color:var(--text3); margin-top:1px; }
  .pal-cat { font-size:10px; margin-top:3px; padding:1px 6px; border-radius:10px; display:inline-block; }
  .empty-pal { padding:50px 20px; text-align:center; color:var(--text3); font-size:13px; line-height:1.8; }

  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--surface3); border:0.5px solid var(--border2); color:var(--text); font-size:13px; padding:9px 18px; border-radius:24px; pointer-events:none; opacity:0; transition:opacity .3s; z-index:100; white-space:nowrap; }
  .toast.show { opacity:1; }
  input[type=file] { display:none; }
  ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">Color<span>Nome</span></div>
      <div class="header-sub">Identifique e nomeie qualquer cor</div>
    </div>
    <button class="palette-btn" onclick="showTab('saved')" title="Minha paleta">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-identify" onclick="showTab('identify')">Identificar</div>
    <div class="tab" id="tab-saved" onclick="showTab('saved')">Minha paleta</div>
  </div>

  <div id="view-identify">
    <div class="capture-area" id="capture-area">
      <div class="placeholder" id="placeholder" onclick="document.getElementById('file-input').click()">
        <div class="ph-icon">📷</div>
        <div class="ph-text">Toque para escolher uma foto</div>
        <div class="ph-hint">ou ative a câmera ao vivo abaixo</div>
      </div>
      <canvas id="preview-canvas"></canvas>
      <video id="camera-video" autoplay playsinline muted></video>
      <div id="crosshair-overlay"><div id="crosshair-ring"></div></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="document.getElementById('file-input').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Galeria
      </button>
      <button class="ctrl-btn" id="btn-camera" onclick="toggleCamera()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Câmera
      </button>
      <button class="save-btn" id="btn-save" onclick="saveBest()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
        Salvar
      </button>
    </div>

    <div class="color-strip" id="color-strip">
      <div class="swatch-empty">Escolha uma imagem e toque na cor que deseja identificar</div>
    </div>

    <!-- Filter chips -->
    <div class="filter-row" id="filter-row"></div>

    <div class="results" id="results"></div>
  </div>

  <div id="view-saved">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Cores salvas</div>
      <button onclick="clearPalette()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer">Limpar tudo</button>
    </div>
    <div class="palette-grid" id="palette-grid"></div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
<div class="toast" id="toast"></div>

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let selectedColor = null;
let allMatches = [];
let savedColors = JSON.parse(localStorage.getItem('cnome_saved') || '[]');
let cameraStream = null;
let imageLoaded = false;
let activeFilters = new Set(Object.keys(CATS)); // all on by default

// ═══════════════════════════════════════════════════════════
//  COLOR MATH
// ═══════════════════════════════════════════════════════════
function rgbToLab(r,g,b){
  r/=255;g/=255;b/=255;
  r=r>0.04045?Math.pow((r+0.055)/1.055,2.4):r/12.92;
  g=g>0.04045?Math.pow((g+0.055)/1.055,2.4):g/12.92;
  b=b>0.04045?Math.pow((b+0.055)/1.055,2.4):b/12.92;
  let x=(r*0.4124564+g*0.3575761+b*0.1804375)/0.95047;
  let y=(r*0.2126729+g*0.7151522+b*0.0721750)/1.00000;
  let z=(r*0.0193339+g*0.1191920+b*0.9503041)/1.08883;
  x=x>0.008856?Math.pow(x,1/3):7.787*x+16/116;
  y=y>0.008856?Math.pow(y,1/3):7.787*y+16/116;
  z=z>0.008856?Math.pow(z,1/3):7.787*z+16/116;
  return{L:116*y-16,a:500*(x-y),b:200*(y-z)};
}
function deltaE(r1,g1,b1,r2,g2,b2){
  const l1=rgbToLab(r1,g1,b1),l2=rgbToLab(r2,g2,b2);
  return Math.sqrt(Math.pow(l1.L-l2.L,2)+Math.pow(l1.a-l2.a,2)+Math.pow(l1.b-l2.b,2));
}
function toHex(r,g,b){'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();}
function hex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();}
function matchScore(de){return Math.max(0,Math.round(100-de*1.8));}

function findMatches(r,g,b){
  return COLORS.map(c=>({...c,de:deltaE(r,g,b,c.r,c.g,c.b)}))
    .sort((a,b)=>a.de-b.de);
}

// ═══════════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════════
function buildFilterChips(){
  const row=document.getElementById('filter-row');
  row.innerHTML=Object.entries(CATS).map(([k,v])=>`
    <div class="chip on" id="chip-${k}" style="background:${v.bg};color:${v.color};border-color:transparent"
         onclick="toggleFilter('${k}')">
      <div class="chip-dot" style="background:${v.color}"></div>${v.label}
    </div>`).join('');
}

function toggleFilter(k){
  if(activeFilters.has(k)) activeFilters.delete(k);
  else activeFilters.add(k);
  const chip=document.getElementById('chip-'+k);
  const v=CATS[k];
  if(activeFilters.has(k)){
    chip.style.background=v.bg; chip.style.color=v.color; chip.style.borderColor='transparent';
  } else {
    chip.style.background=''; chip.style.color='var(--text3)'; chip.style.borderColor='var(--border2)';
  }
  renderResults();
}

// ═══════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════
function showTab(tab){
  document.getElementById('view-identify').style.display=tab==='identify'?'contents':'none';
  document.getElementById('view-saved').style.display=tab==='saved'?'block':'none';
  document.getElementById('tab-identify').classList.toggle('active',tab==='identify');
  document.getElementById('tab-saved').classList.toggle('active',tab==='saved');
  if(tab==='saved') renderPalette();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function setColorStrip(r,g,b){
  const h=hex(r,g,b);
  document.getElementById('color-strip').innerHTML=`
    <div class="swatch-box" style="background:${h}"></div>
    <div style="flex:1"><div class="swatch-hex">${h}</div><div class="swatch-rgb">R ${r} · G ${g} · B ${b}</div></div>
    <div class="tap-badge">cor capturada</div>`;
}

function renderResults(){
  const el=document.getElementById('results');
  if(!allMatches.length){ el.innerHTML=''; return; }
  if(!activeFilters.size){
    el.innerHTML='<div class="no-filter">Nenhuma categoria selecionada.<br>Ative ao menos um filtro acima.</div>';
    return;
  }
  const filtered=allMatches.filter(m=>activeFilters.has(m.cat)).slice(0,8);
  if(!filtered.length){
    el.innerHTML='<div class="no-filter">Sem resultados para as categorias selecionadas.</div>';
    return;
  }
  el.innerHTML='<div class="results-label">Cores mais próximas</div>'+
    filtered.map((m,i)=>{
      const score=matchScore(m.de);
      const bc=score>=90?'match-hi':score>=75?'match-md':'match-lo';
      const cv=CATS[m.cat];
      return`<div class="pantone-card ${i===0&&filtered[0]===allMatches.filter(x=>activeFilters.has(x.cat))[0]?'best':''}">
        <div class="p-swatch" style="background:${hex(m.r,m.g,m.b)}"></div>
        <div class="p-details">
          <div class="p-name">${m.name}</div>
          <div class="p-meta">
            <span class="cat-badge" style="background:${cv.bg};color:${cv.color}">${cv.label}</span>
            <span>${m.code}</span>
          </div>
        </div>
        <div class="p-right">
          <span class="match-badge ${bc}">${score}%</span>
          ${i===0?'<span class="best-tag">melhor</span>':''}
        </div>
      </div>`;
    }).join('');
  document.getElementById('btn-save').style.display='flex';
}

// ═══════════════════════════════════════════════════════════
//  IMAGE / CAMERA
// ═══════════════════════════════════════════════════════════
function loadImage(e){
  const file=e.target.files[0]; if(!file) return;
  stopCamera();
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.getElementById('preview-canvas');
      canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
      canvas.style.display='block'; canvas.style.height='270px';
      document.getElementById('placeholder').style.display='none';
      document.getElementById('camera-video').style.display='none';
      canvas.getContext('2d').drawImage(img,0,0);
      imageLoaded=true;
      setupCrosshair(canvas);
      pickColor(canvas,canvas.width/2,canvas.height/2);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function setupCrosshair(canvas){
  const overlay=document.getElementById('crosshair-overlay');
  const ring=document.getElementById('crosshair-ring');
  overlay.style.display='block';
  ring.style.left='50%'; ring.style.top='135px';
  const handler=ev=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const px=(ev.clientX-rect.left), py=(ev.clientY-rect.top);
    ring.style.left=px+'px'; ring.style.top=py+'px';
    pickColor(canvas,px*sx,py*sy);
  };
  canvas.onclick=handler;
}

function pickColor(canvas,cx,cy){
  const ctx=canvas.getContext('2d');
  const s=6, d=ctx.getImageData(Math.max(0,cx-s),Math.max(0,cy-s),s*2,s*2).data;
  let r=0,g=0,b=0,n=0;
  for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
  r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
  selectedColor={r,g,b};
  setColorStrip(r,g,b);
  allMatches=findMatches(r,g,b);
  renderResults();
}

async function toggleCamera(){
  if(cameraStream){stopCamera();return;}
  try{
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    const v=document.getElementById('camera-video');
    v.srcObject=cameraStream; v.style.display='block';
    document.getElementById('preview-canvas').style.display='none';
    document.getElementById('placeholder').style.display='none';
    document.getElementById('btn-camera').classList.add('active');
    document.getElementById('btn-camera').innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Parar`;
    const ring=document.getElementById('crosshair-ring');
    document.getElementById('crosshair-overlay').style.display='block';
    ring.style.left='50%'; ring.style.top='135px';
    v.onclick=captureFromCamera;
  }catch(e){toast('Câmera indisponível — use a galeria');}
}

function captureFromCamera(){
  const v=document.getElementById('camera-video');
  const c=document.getElementById('preview-canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.style.height='270px'; c.style.display='block';
  v.style.display='none';
  c.getContext('2d').drawImage(v,0,0);
  stopCamera(true); setupCrosshair(c);
  pickColor(c,c.width/2,c.height/2);
}

function stopCamera(keep=false){
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  if(!keep){
    document.getElementById('camera-video').style.display='none';
    if(!imageLoaded) document.getElementById('placeholder').style.display='flex';
  }
  document.getElementById('btn-camera').classList.remove('active');
  document.getElementById('btn-camera').innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Câmera`;
}

// ═══════════════════════════════════════════════════════════
//  SAVE / PALETTE
// ═══════════════════════════════════════════════════════════
function saveBest(){
  const filtered=allMatches.filter(m=>activeFilters.has(m.cat));
  if(!filtered.length||!selectedColor) return;
  const best=filtered[0];
  const score=matchScore(best.de);
  const entry={name:best.name,code:best.code,cat:best.cat,origin:best.origin,
    hex:hex(selectedColor.r,selectedColor.g,selectedColor.b),
    pantoneHex:hex(best.r,best.g,best.b),score,date:Date.now()};
  if(!savedColors.find(s=>s.code===best.code&&s.cat===best.cat)){
    savedColors.unshift(entry);
    if(savedColors.length>60) savedColors.pop();
    localStorage.setItem('cnome_saved',JSON.stringify(savedColors));
    toast(`"${best.name}" salva na paleta`);
  } else { toast('Esta cor já está na sua paleta'); }
}

function renderPalette(){
  const grid=document.getElementById('palette-grid');
  document.querySelector('#view-saved .empty-pal')?.remove();
  if(!savedColors.length){
    grid.innerHTML='';
    const e=document.createElement('div');
    e.className='empty-pal';
    e.innerHTML='Nenhuma cor salva ainda.<br>Identifique uma cor e toque em <strong>Salvar</strong>.';
    grid.after(e); return;
  }
  grid.innerHTML=savedColors.map(s=>{
    const cv=CATS[s.cat]||CATS.pantone;
    return`<div class="pal-card">
      <div class="pal-swatch" style="background:${s.pantoneHex}"></div>
      <div class="pal-info">
        <div class="pal-name">${s.name}</div>
        <div class="pal-code">${s.code}</div>
        <span class="pal-cat" style="background:${cv.bg};color:${cv.color}">${cv.label}</span>
      </div>
    </div>`;
  }).join('');
}

function clearPalette(){
  if(!savedColors.length) return;
  savedColors=[];
  localStorage.setItem('cnome_saved','[]');
  renderPalette();
  toast('Paleta limpa');
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
buildFilterChips();
document.getElementById('view-identify').style.display='contents';
document.getElementById('view-saved').style.display='none';
</script>
